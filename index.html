    <script>
    // -------------------- 3. بناء هيكل الصفحات (HTML داخلي) --------------------
    function buildPages() {

            </div>

                <div class="card"><h3>🏆 أعلى 5 ديون نشطة</h3><canvas id="topDebtsChart"></canvas></div>

        `;
    }
    
    // -------------------- 4. دوال الإحصائيات (مُعدلة: getCashTotal تشمل التسديدات) --------------------
    function getTotalProduction() { return productions.reduce((s,p)=> s + p.boards, 0); }
    function getTotalSalesQty() { return customerTransactions.filter(t=> t.type === "purchase").reduce((s,t)=> s + (t.qty || 0), 0); }
    function getTotalDamages() { return damages.reduce((s,d)=> s + d.qty, 0); }
    function getApproxStock() { return getTotalProduction() - getTotalSalesQty() - getTotalDamages(); }
    function getCashTotal() {
        let cashFromSales = customerTransactions.filter(t=> t.type === "purchase" && t.remaining === 0).reduce((s,t)=> s + t.paid, 0);
        let repayments = customerTransactions.filter(t=> t.type === "repayment").reduce((s,t)=> s + (t.paid || 0), 0);
        return cashFromSales + repayments;
    }
    function getDebtsTotal() { return customers.reduce((s,c)=> s + (c.totalDebt || 0), 0); }
    function getExpensesTotal() { return expenses.reduce((s,e)=> s + e.amount, 0); }
    function getNetProfit() { return getCashTotal() - getExpensesTotal(); }
    
    function updateCustomersDebt() {
        let debtMap = new Map();
        customers.forEach(c => debtMap.set(c.id, 0));
        customerTransactions.forEach(t => {
            if(t.type === "purchase") {
                let curr = debtMap.get(t.customerId) || 0;
                debtMap.set(t.customerId, curr + (t.remaining || 0));
            } else if(t.type === "repayment") {
                let curr = debtMap.get(t.customerId) || 0;
                debtMap.set(t.customerId, curr - (t.paid || 0));
            }
        });
        customers.forEach(c => { c.totalDebt = Math.max(0, debtMap.get(c.id) || 0); });
    }
    
    // -------------------- 5. حفظ وتحميل البيانات من Firestore --------------------
    async function saveAllToFirestore() {
        if (!currentUser) return;
        try {
            await db.collection("factoryData").doc("main").set({
                customers, transactions: customerTransactions, productions, expenses, damages, workers, cyclesLog,
                lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        } catch(e) { console.error(e); }
    }
    
    async function loadAllFromFirestore() {
        if (!currentUser) return;
        try {
            const doc = await db.collection("factoryData").doc("main").get();
            if(doc.exists) {
                const data = doc.data();
                customers = data.customers || [];
                customerTransactions = data.transactions || [];
                productions = data.productions || [];
                expenses = data.expenses || [];
                damages = data.damages || [];
                workers = data.workers || [];
                cyclesLog = data.cyclesLog || [];
            } else {
                // بيانات افتراضية للعمال
                workers = [
                    { id:"w1", name:"محمد أحمد", cycles:0, totalEarned:0, advances:0 },
                    { id:"w2", name:"خالد علي", cycles:0, totalEarned:0, advances:0 },
                    { id:"w3", name:"سعيد جمال", cycles:0, totalEarned:0, advances:0 },
                    { id:"w4", name:"نادر سمير", cycles:0, totalEarned:0, advances:0 }
                ];
            }
            updateCustomersDebt();
            updateUI();
        } catch(e) { console.error(e); showToast("⚠️ خطأ في التحميل من السحابة", true); }
    }
    
    // دوال التحديث وعرض البيانات (updateUI, renderWorkersTable, ...) ستأتي في الجزء الثالث
    function updateUI() { /* سيتم إكمالها */ }
    
    console.log("الجزء الثاني اكتمل. أرسل 'تم' لاستلام الجزء الثالث.");
    // -------------------- 6. دوال العمليات الأساسية (مع صلاحيات) --------------------
    function addCustomer() {
        if(userRole !== "admin") { showToast("❌ غير مسموح، صلاحيات المدير فقط", true); return; }
        let name = prompt("اسم العميل الجديد:");
        if(name && name.trim()) {
            let id = "c" + Date.now();
            customers.push({ id, name: name.trim(), totalDebt: 0 });
            saveAllToFirestore();
            updateUI();
            showToast(`➕ تم إضافة العميل ${name}`);
        }
    }
    
    function addPurchase() {
        if(userRole !== "admin") { showToast("❌ غير مسموح، صلاحيات المدير فقط", true); return; }
        let qty = parseInt(document.getElementById("saleQty")?.value || 0);
        let price = parseFloat(document.getElementById("salePrice")?.value || 0);
        let paidNow = parseFloat(document.getElementById("paidNow")?.value || 0);
        let customerId = document.getElementById("customerSelect")?.value;
        if(!qty || qty<=0 || !price || price<=0) { alert("أدخل كمية وسعر صحيح"); return; }
        if(isNaN(paidNow)) paidNow = 0;
        let totalAmount = qty * price;
        let remaining = totalAmount - paidNow;
        if(remaining < 0) { alert("المبلغ المدفوع لا يمكن أن يزيد عن الإجمالي"); return; }
        let today = new Date().toISOString().slice(0,10);
        if(remaining === 0) { // كاش كامل
            customerTransactions.push({
                id: "t"+Date.now(), customerId: "cash", customerName: "كاش", date: today,
                type: "purchase", qty, price, totalAmount, paid: paidNow, remaining: 0, note: "كاش"
            });
            saveAllToFirestore();
            document.getElementById("saleQty").value = "0";
            document.getElementById("paidNow").value = "0";
            updateUI();
            showToast(`✅ بيع كاش: ${qty} لوح, ${totalAmount.toFixed(2)}`);
            return;
        }
        // دين جزئي أو كامل
        if(!customerId) { alert("عند الدفع الجزئي أو الدين الكامل، يجب اختيار عميل"); return; }
        let customer = customers.find(c => c.id === customerId);
        if(!customer) { alert("العميل غير موجود"); return; }
        customerTransactions.push({
            id: "t"+Date.now(), customerId, customerName: customer.name, date: today,
            type: "purchase", qty, price, totalAmount, paid: paidNow, remaining,
            note: paidNow===0 ? "دين كامل" : `دفع ${paidNow} والباقي ${remaining}`
        });
        updateCustomersDebt();
        saveAllToFirestore();
        document.getElementById("saleQty").value = "0";
        document.getElementById("paidNow").value = "0";
        updateUI();
        showToast(`✅ ${qty} لوح للعميل ${customer.name}, دفع ${paidNow}, متبقي ${remaining}`);
    }
    
    function repayDebt() {
        if(userRole !== "admin") { showToast("❌ غير مسموح، صلاحيات المدير فقط", true); return; }
        let customerId = document.getElementById("repayCustomerSelect")?.value;
        let amount = parseFloat(document.getElementById("repayAmount")?.value || 0);
        if(!customerId) { alert("اختر عميلاً"); return; }
        if(isNaN(amount) || amount<=0) { alert("أدخل مبلغاً صحيحاً"); return; }
        let customer = customers.find(c => c.id === customerId);
        if(!customer) return;
        if(amount > customer.totalDebt) { alert(`المبلغ أكبر من المتبقي (${customer.totalDebt})`); return; }
        let today = new Date().toISOString().slice(0,10);
        customerTransactions.push({
            id: "t"+Date.now(), customerId, date: today,
            type: "repayment", paid: amount, note: `تسديد ${amount}`
        });
        updateCustomersDebt();
        saveAllToFirestore();
        document.getElementById("repayAmount").value = "";
        updateUI();
        showToast(`💰 تم تسديد ${amount} من حساب ${customer.name}`);
    }
    
    // دوال العمال (مختصرة ولكن مع صلاحيات)
    function addNewWorker() {
        if(userRole !== "admin") { showToast("❌ غير مسموح", true); return; }
        let n = prompt("اسم العامل:");
        if(n) workers.push({ id:"w"+Date.now(), name:n, cycles:0, totalEarned:0, advances:0 });
        saveAllToFirestore();
        updateUI();
    }
    function recordGroupCycle() {
        if(userRole !== "admin") { showToast("❌ غير مسموح", true); return; }
        let d = new Date().toISOString().slice(0,10);
        workers.forEach(w => {
            if(confirm(`هل حضر ${w.name}؟`)) {
                let wage = parseFloat(prompt(`أجره:`));
                if(wage>0) { w.cycles++; w.totalEarned += wage; cyclesLog.push({ workerId:w.id, date:d, earned:wage }); }
            }
        });
        saveAllToFirestore();
        updateUI();
        showToast("تم تسجيل الدورة");
    }
    function addProduction() {
        if(userRole !== "admin") { showToast("❌ غير مسموح", true); return; }
        productions.push({ date: document.getElementById("prodDate").value, boards: 340 });
        saveAllToFirestore();
        updateUI();
        showToast("🏭 دورة إنتاج 340 لوح");
    }
    function addExpense() {
        if(userRole !== "admin") { showToast("❌ غير مسموح", true); return; }
        let d = document.getElementById("expDesc").value, a = parseFloat(document.getElementById("expAmount").value), dt = document.getElementById("expDate").value;
        if(d && a>0) { expenses.push({ date:dt, desc:d, amount:a }); saveAllToFirestore(); updateUI(); showToast(`💸 مصروف: ${d}`); }
        document.getElementById("expDesc").value = ""; document.getElementById("expAmount").value = "";
    }
    function addDamage() {
        if(userRole !== "admin") { showToast("❌ غير مسموح", true); return; }
        let q = parseInt(document.getElementById("damageQty").value), dt = document.getElementById("damageDate").value;
        if(q>0) { damages.push({ date:dt, qty:q }); saveAllToFirestore(); updateUI(); showToast(`⚠️ تالف ${q} لوح`); }
        document.getElementById("damageQty").value = "";

    function resetWeek() {
        if(userRole !== "admin") { showToast("❌ غير مسموح", true); return; }
        let remainingStock = getApproxStock();
        if(confirm(`⚠️ سيتم حذف سجل الأسبوع الحالي. سيتم ترحيل المخزون المتبقي (${remainingStock} لوح). هل تريد المتابعة؟`)) {
            // حفظ نسخة احتياطية
            localStorage.setItem("factory_last_week_backup", JSON.stringify({
                backupDate: new Date().toISOString(),
                customers, customerTransactions, productions, expenses, damages, workers, cyclesLog
            }));
            customerTransactions = [];
            expenses = [];
            damages = [];
            if(remainingStock > 0) {
                productions = [{ date: new Date().toISOString().slice(0,10), boards: remainingStock, note: "رصيد من الأسبوع السابق" }];
            } else { productions = []; }
            cyclesLog = [];
            workers.forEach(w => { w.cycles = 0; w.totalEarned = 0; }); // نحتفظ بالسلفيات
            saveAllToFirestore();
            updateUI();
            showToast(`✅ بدأ أسبوع جديد، تم ترحيل ${remainingStock} لوح`);

    }

        // -------------------- 8. الرسوم البيانية (Chart.js) --------------------
    let charts = {};
    function initCharts() {
        const ctx1 = document.getElementById('dailySalesChart')?.getContext('2d');
        const ctx2 = document.getElementById('topDebtsChart')?.getContext('2d');
        const ctx3 = document.getElementById('revenuePieChart')?.getContext('2d');
        const ctx4 = document.getElementById('prodVsSalesChart')?.getContext('2d');
        if(ctx1) charts.dailySales = new Chart(ctx1, { type: 'line', data: { labels: [], datasets: [{ label: 'المبيعات (قيمة)', data: [], borderColor: '#1e6f5c', tension: 0.2 }] } });
        if(ctx2) charts.topDebts = new Chart(ctx2, { type: 'bar', data: { labels: [], datasets: [{ label: 'المتبقي (دين)', data: [], backgroundColor: '#c44536' }] } });
        if(ctx3) charts.revenuePie = new Chart(ctx3, { type: 'pie', data: { labels: ['كاش', 'ديون مستحقة'], datasets: [{ data: [0,0], backgroundColor: ['#2e7d32', '#e6a017'] }] } });
        if(ctx4) charts.prodVsSales = new Chart(ctx4, { type: 'bar', data: { labels: [], datasets: [{ label: 'الإنتاج', data: [], backgroundColor: '#1e4660' }, { label: 'المبيعات', data: [], backgroundColor: '#e6a017' }] } });
    }
    function updateCharts() {
        if(!charts.dailySales) return;
        // المبيعات اليومية لآخر 7 أيام
        let last7Days = [...Array(7)].map((_,i) => { let d = new Date(); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10); }).reverse();
        let dailySalesData = last7Days.map(date => customerTransactions.filter(t=> t.type==="purchase" && t.date===date).reduce((s,t)=> s + t.paid,0));
        charts.dailySales.data.labels = last7Days;
        charts.dailySales.data.datasets[0].data = dailySalesData;
        charts.dailySales.update();
        // أعلى 5 ديون
        let top5 = [...customers].sort((a,b)=> (b.totalDebt||0) - (a.totalDebt||0)).slice(0,5);
        charts.topDebts.data.labels = top5.map(c=> c.name);
        charts.topDebts.data.datasets[0].data = top5.map(c=> c.totalDebt);
        charts.topDebts.update();
        // هيكل الإيرادات
        let cash = getCashTotal(), debts = getDebtsTotal();
        charts.revenuePie.data.datasets[0].data = [cash, debts];
        charts.revenuePie.update();
        // الإنتاج vs المبيعات لآخر 7 أيام
        let prodData = last7Days.map(date => productions.filter(p=> p.date===date).reduce((s,p)=> s + p.boards,0));
        let salesQtyData = last7Days.map(date => customerTransactions.filter(t=> t.type==="purchase" && t.date===date).reduce((s,t)=> s + t.qty,0));
        charts.prodVsSales.data.labels = last7Days;
        charts.prodVsSales.data.datasets[0].data = prodData;
        charts.prodVsSales.data.datasets[1].data = salesQtyData;
        charts.prodVsSales.update();
    }
    window.updateCharts = updateCharts;

            <h3>📅 السجل اليومي</h3><table style="width:100%;border:1px solid #ccc;"><tr><th>التاريخ</th><th>البيان</th><th>الكمية</th><th>المبلغ</th><th>النوع</th></tr>${(()=>{ let rows=''; [...customerTransactions.filter(t=>t.type==='purchase'), ...productions, ...expenses, ...damages].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(item=>{ if(item.qty!==undefined) rows+=`<tr><td>${item.date}</td><td>بيع ${item.qty} لوح</td><td>${item.qty}</td><td>${item.paid||0}</td><td>${item.remaining===0?'كاش':'دين'}</td></tr>`; else if(item.boards) rows+=`<tr><td>${item.date}</td><td>إنتاج ${item.boards}</td><td>${item.boards}</td><td>-</td><td>إنتاج</td></tr>`; else if(item.desc) rows+=`<tr><td>${item.date}</td><td>مصروف: ${item.desc}</td><td>-</td><td>${item.amount}</td><td>مصروف</td></tr>`; else if(item.qty) rows+=`<tr><td>${item.date}</td><td>تالف ${item.qty}</td><td>${item.qty}</td><td>-</td><td>تالف</td></tr>`; }); return rows; })()}</table></div>`;
            contentDiv.innerHTML = html;
            await new Promise(r=>setTimeout(r,200));
            const canvas = await html2canvas(captureDiv, { scale: 2, backgroundColor: "#ffffff" });

    function exportToCSV() {
        let start = document.getElementById("archiveStartDate").value;
        let end = document.getElementById("archiveEndDate").value;
        let filtered = customerTransactions.filter(t => t.date >= start && t.date <= end && t.type==="purchase");
        let csvRows = [["التاريخ","العميل","الكمية","المدفوع","المتبقي"]];
        filtered.forEach(t => csvRows.push([t.date, t.customerName, t.qty, t.paid, t.remaining]));
        let csv = csvRows.map(row => row.join(",")).join("\n");
        let blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
        let link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `archive_${start}_to_${end}.csv`;
        link.click();
        showToast("📎 تم التصدير إلى CSV");
    }

    async function handleLogin(email, password, isGuest = false) {
        if(isGuest) {
            currentUser = { uid: "guest", email: "guest" };
            userRole = "guest";
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("mainContainer").style.display = "block";
            document.querySelector("header").style.display = "flex";
            document.querySelector(".tabs").style.display = "flex";
            showToast("👁️ دخول كزائر: يمكنك مشاهدة التحليلات والتقارير العامة فقط");
            // تعطيل التبويبات ذات الصلاحية
            document.querySelectorAll(".tab-btn").forEach(btn => {
                if(["sales","productionExp","workers","debts"].includes(btn.dataset.page)) btn.style.display = "none";
                else btn.style.display = "block";
            });
            updateUI();
            initCharts();
            updateCharts();
            return;
        }
        try {
            const userCred = await auth.signInWithEmailAndPassword(email, password);
            currentUser = userCred.user;
            // تحديد الدور: إذا كان البريد هو admin@icefactory.com (مثال) أو أول مستخدم مسجل
            const isAdmin = (email === "admin@icefactory.com"); // يمكنك تغيير هذا إلى قائمة في Firestore
            userRole = isAdmin ? "admin" : "viewer";
            document.getElementById("authScreen").style.display = "none";
            document.getElementById("mainContainer").style.display = "block";
            document.querySelector("header").style.display = "flex";
            document.querySelector(".tabs").style.display = "flex";
            if(userRole === "admin") showToast("🔐 مرحباً أيها المدير، لديك صلاحيات كاملة");
            else showToast("👤 مرحباً، لديك صلاحيات مشاهدة فقط (لا تعديل)");
            await loadAllFromFirestore();
            updateUI();
            initCharts();
            updateCharts();
        } catch(e) {
            if(e.code === "auth/user-not-found") {
                // إنشاء مستخدم جديد (صلاحيات viewer)
                try {
                    const newUser = await auth.createUserWithEmailAndPassword(email, password);
                    currentUser = newUser.user;
                    userRole = "viewer";
                    document.getElementById("authScreen").style.display = "none";
                    document.getElementById("mainContainer").style.display = "block";
                    document.querySelector("header").style.display = "flex";
                    document.querySelector(".tabs").style.display = "flex";
                    showToast("📝 تم إنشاء حسابك، صلاحيات مشاهدة فقط");
                    await loadAllFromFirestore();
                    updateUI();
                    initCharts();
                    updateCharts();
                } catch(createErr) { showToast("❌ فشل إنشاء الحساب", true); }
            } else { showToast("❌ خطأ في الدخول: " + e.message, true); }
        }
    }

                updateUI();
                initCharts();
                updateCharts();
                // إخفاء التبويبات للمستخدم العادي
                if(userRole !== "admin") {
                    document.querySelectorAll(".tab-btn").forEach(btn => {
                        if(["sales","productionExp","workers","debts"].includes(btn.dataset.page)) btn.style.display = "none";
                    });
                }
            } else {
                // لا يوجد مستخدم، نعرض شاشة الدخول
                document.getElementById("authScreen").style.display = "block";
                document.getElementById("mainContainer").style.display = "none";
                document.querySelector("header").style.display = "none";
                document.querySelector(".tabs").style.display = "none";
            }
        });
        // إضافة مستمعي الأحداث
        document.getElementById("loginBtn").onclick = () => handleLogin(document.getElementById("loginEmail").value, document.getElementById("loginPassword").value, false);
        document.getElementById("guestBtn").onclick = () => handleLogin("", "", true);
        document.getElementById("addSaleBtn").onclick = addPurchase;
        document.getElementById("addCustomerBtn").onclick = addCustomer;
        document.getElementById("repayDebtBtn").onclick = repayDebt;
        document.getElementById("addProductionBtn").onclick = addProduction;
        document.getElementById("addExpenseBtn").onclick = addExpense;
        document.getElementById("addDamageBtn").onclick = addDamage;
        document.getElementById("recordCycleBtn").onclick = recordGroupCycle;
        document.getElementById("addWorkerBtn").onclick = addNewWorker;
        document.getElementById("generatePdfBtn").onclick = () => generatePDF(false);
        document.getElementById("sharePdfBtn").onclick = () => generatePDF(true);
        document.getElementById("copyReportBtn").onclick = copyReport;
        document.getElementById("resetWeekBtn").onclick = resetWeek;
        document.getElementById("archiveFilterBtn").onclick = showArchive;
        document.getElementById("exportArchiveBtn").onclick = exportToCSV;
        // أزرار الكمية
        document.getElementById("incQty1").onclick = () => { let i = document.getElementById("saleQty"); i.value = (+i.value||0)+1; };
        document.getElementById("incQty5").onclick = () => { let i = document.getElementById("saleQty"); i.value = (+i.value||0)+5; };
        document.getElementById("incQty10").onclick = () => { let i = document.getElementById("saleQty"); i.value = (+i.value||0)+10; };
        document.getElementById("resetQtyBtn").onclick = () => { document.getElementById("saleQty").value = 0; };
        // التنقل بين التبويبات
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
                btn.classList.add("active");
                document.querySelectorAll(".page").forEach(p=>p.classList.remove("active-page"));
                document.getElementById(btn.dataset.page).classList.add("active-page");
                if(btn.dataset.page === "analytics" && charts.dailySales) updateCharts();
            };
        });
        // عند تغيير المبلغ المدفوع، تلوين حقل العميل
        document.getElementById("paidNow").addEventListener("input", function() {
            let qty = +document.getElementById("saleQty").value, price = +document.getElementById("salePrice").value, paid = +this.value;
            let remaining = (qty*price) - paid;
            let custSel = document.getElementById("customerSelect");
            if(remaining > 0 && !custSel.value) custSel.classList.add("customer-required");
            else custSel.classList.remove("customer-required");
        });
        // زر تسجيل الخروج (يمكن إضافته في header)
        let logoutBtn = document.createElement("button");
        logoutBtn.innerText = "🚪 خروج";
        logoutBtn.className = "logout-btn";
        logoutBtn.onclick = logout;
        document.querySelector(".user-info").appendChild(logoutBtn);
        document.querySelector(".user-info").innerHTML = `<span>${currentUser ? (userRole==="admin"? "👑 مدير" : "👤 مستخدم") : "زائر"}</span>`;
    };
    console.log("الجزء الرابع والأخير تم بنجاح. التطبيق جاهز للتشغيل.");
    </script>
</body>
</html>
