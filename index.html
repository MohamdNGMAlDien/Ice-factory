<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نظام إدارة مصنع الثلج المتكامل</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-ice-cream"></i>
                <h2>مصنع الثلج</h2>
                <p>النظام المتكامل</p>
            </div>
            <nav class="nav-menu">
                <a href="#" data-page="dashboard" class="nav-item active">
                    <i class="fas fa-chart-line"></i>
                    <span>لوحة التحكم</span>
                </a>
                <a href="#" data-page="sales" class="nav-item">
                    <i class="fas fa-cash-register"></i>
                    <span>البيع والديون</span>
                </a>
                <a href="#" data-page="workers" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>إدارة العمال</span>
                </a>
                <a href="#" data-page="production" class="nav-item">
                    <i class="fas fa-factory"></i>
                    <span>الإنتاج والمصروفات</span>
                </a>
                <a href="#" data-page="reports" class="nav-item">
                    <i class="fas fa-file-alt"></i>
                    <span>التقارير</span>
                </a>
                <a href="#" data-page="archive" class="nav-item">
                    <i class="fas fa-archive"></i>
                    <span>الأرشيف التاريخي</span>
                </a>
            </nav>
            <div class="sync-status" id="syncStatus">
                <i class="fas fa-cloud"></i>
                <span>متصل بالسحابة</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menuToggle" class="menu-toggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="date-time" id="currentDateTime"></div>
                <button id="backupNowBtn" class="backup-btn">
                    <i class="fas fa-database"></i>
                    نسخ احتياطي
                </button>
            </header>

            <div class="pages-container">
                <!-- Dashboard Page -->
                <div id="dashboard" class="page active">
                    <div class="stats-grid" id="statsGrid"></div>
                    <div class="quick-actions">
                        <button onclick="window.quickSale()" class="action-card">
                            <i class="fas fa-bolt"></i>
                            <span>بيع سريع</span>
                        </button>
                        <button onclick="window.quickDebt()" class="action-card">
                            <i class="fas fa-hand-holding-usd"></i>
                            <span>تسديد دين</span>
                        </button>
                        <button onclick="window.quickProduction()" class="action-card">
                            <i class="fas fa-plus-circle"></i>
                            <span>إضافة إنتاج</span>
                        </button>
                    </div>
                </div>

                <!-- Other pages will be loaded dynamically -->
                <div id="sales" class="page"></div>
                <div id="workers" class="page"></div>
                <div id="production" class="page"></div>
                <div id="reports" class="page"></div>
                <div id="archive" class="page"></div>
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <p>جاري المعالجة...</p>
    </div>

    <!-- Scripts -->
    <script src="js/config/firebase-config.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/utils/pdf-generator.js"></script>
    <script src="js/modules/db.js"></script>
    <script src="js/modules/sales.js"></script>
    <script src="js/modules/workers.js"></script>
    <script src="js/modules/production.js"></script>
    <script src="js/modules/reports.js"></script>
    <script src="js/modules/backup.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
