<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PDF Generation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dawood2007/ar-fonts-for-jspdf@master/aref-ruqaa-normal.js"></script> <!-- Added Aref Ruqaa font -->
</head>
<body>
    <button onclick="generatePDF()">Generate PDF</button>

    <script>
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            // Updated font for Arabic support
            doc.addFont("ArefRuqaa-Regular.ttf", "ArefRuqaa", "normal");
            doc.setFont("ArefRuqaa");
            let line = 'Your Arabic text here...';
            let y = 10;
            doc.text(line, 550, y, {align: 'right'}); // Aligned to the right
            // Adjust all other text positions accordingly
            // For example: doc.text('Some other text', 550, y + 10, {align: 'right'});
            doc.save('Report.pdf');
        }
    </script>
</body>
</html>
